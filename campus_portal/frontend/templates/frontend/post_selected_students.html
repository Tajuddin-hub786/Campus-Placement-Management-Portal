{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post Selected Student</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f6fa;
}
header{
    background:#1b365d;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items: center;
}
header h1{
    margin:0;
    font-size :22px;
}
header  a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

.container{
    width:420px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
}
input, button{
    width:100%;
    padding:12px;
    margin:10px 0;
}
button{
    background:#1b365d;
    color:white;
    border:none;
}
</style>
</head>

<body>

<header>
    <h1>Smart Career - Admin</h1>
    <div>
        <a href="{% url 'applied_students' %}">Applied students</a>
        <a href="{% url 'admin_dashboard' %}">Dashboard</a>
        <a href="{% url 'main' %}">Back to Home</a>
    </div>
</header>

<div class="container">
    <h2>Post Selected Student</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="text" name="student_name" placeholder="Student Name" required>
        <input type="text" name="register_number" placeholder="Register Number" required>
        <input type="text" name="branch" placeholder="Branch" required>
        <input type="text" name="company_name" placeholder="Company Name" required>
        <input type="text" name="package" placeholder="Package" required>
        <input type="file" name="student_photo" required>

        <button type="submit">Post Selected Student</button>
    </form>
</div>

</body>
</html>
